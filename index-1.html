<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Le Marii</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffe4ef,#f5d8ff);display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}
.card{position:relative;z-index:10;width:420px;max-width:90vw;background:#ffffffee;border-radius:32px;padding:32px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.15)}
.avatar{width:150px;height:150px;border-radius:50%;margin:auto;background:#f7b4d5;display:flex;align-items:center;justify-content:center;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
a{display:block;margin:12px 0;padding:16px;border-radius:16px;text-decoration:none;color:#fff;font-weight:bold}
.ig{background:#d16ba5}.tt{background:#ff5b8a}.tg{background:#3aa8ff}.mail{background:#9b59ff}
.cat{position:fixed;font-size:54px;pointer-events:auto;user-select:none;transition:transform .2s}
</style>
</head>
<body>
<div class="card">
<div class="avatar"><img src="avatar.jpg"></div>
<h1>Le Marii 🤍</h1>
<p><b>Добро пожаловать в мой мир 🤍</b><br><br>Девушка, которая романтизирует свою жизнь ✨</p>
<a class="ig" href="https://www.instagram.com/le.mariiii">Instagram</a>
<a class="tt" href="https://www.tiktok.com/@le.mariiiii">TikTok</a>
<a class="tg" href="https://t.me/podmishkiii">Telegram</a>
<a class="mail" href="mailto:le.mariiii19@gmail.com">Связаться</a>
</div>
<script>
const emojis=["🐈","🐱","🎀🐈","🤍🐈","🌸🐈"];
const cats=[];
for(let i=0;i<14;i++){
 let d=document.createElement('div');
 d.className='cat';
 d.textContent=emojis[Math.floor(Math.random()*emojis.length)];
 document.body.appendChild(d);
 cats.push({el:d,x:Math.random()*innerWidth,y:Math.random()*innerHeight,
 vx:(Math.random()*4-2)||1,vy:(Math.random()*4-2)||1});
 d.onclick=()=>{d.style.transform='scale(1.5)';setTimeout(()=>d.style.transform='',250);}
}
function step(){
 const card=document.querySelector('.card').getBoundingClientRect();
 cats.forEach(c=>{
  c.x+=c.vx;c.y+=c.vy;
  if(c.x<0||c.x>innerWidth-60)c.vx*=-1;
  if(c.y<0||c.y>innerHeight-60)c.vy*=-1;
  if(c.x>card.left-40&&c.x<card.right&&c.y>card.top-40&&c.y<card.bottom){c.vx*=-1;c.vy*=-1;}
  if(Math.random()<0.01){c.vx=(Math.random()*4-2);c.vy=(Math.random()*4-2);}
  c.el.style.left=c.x+'px';c.el.style.top=c.y+'px';
 });
 requestAnimationFrame(step);
}
step();
</script>
</body></html>
