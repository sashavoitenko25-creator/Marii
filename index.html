/* ===== ДВИЖЕНИЕ ===== */



.walk-right{


animation:

walkRight 16s linear infinite;


}




.walk-left{


animation:

walkLeft 18s linear infinite;


}




.jump{


animation:

jumpCat 3s infinite;


}





@keyframes walkRight{


from{

transform:translateX(-250px);

}



to{

transform:translateX(calc(100vw + 250px));

}


}





@keyframes walkLeft{


from{

transform:translateX(250px);

}



to{

transform:translateX(calc(-100vw - 250px));

}



}





@keyframes jumpCat{


0%,100%{

transform:translateY(0);

}



50%{

transform:translateY(-30px);

}


}









/* ===== МАЛЕНЬКИЕ КОТЯТА ===== */



.small-cat{


position:absolute;


font-size:55px;


z-index:8;


image-rendering:pixelated;


}




.kitten-one{


bottom:15px;

left:-80px;


animation:

smallWalk 12s linear infinite;


}



.kitten-two{


bottom:80px;


right:-80px;


animation:

smallWalkBack 14s linear infinite;


}



.kitten-three{


top:80px;


left:45%;


animation:

smallJump 4s infinite;


}





@keyframes smallWalk{


from{

transform:translateX(-100px);

}


to{

transform:translateX(120vw);

}


}





@keyframes smallWalkBack{


from{

transform:translateX(100px);

}


to{

transform:translateX(-120vw);

}


}





@keyframes smallJump{


50%{

transform:

translateY(-20px);

}


}

<style>


/* ===== ФОРМА 8-BIT КОТА ===== */



.pixel-cat{


position:relative;

width:150px;

height:150px;


}



.head{


position:absolute;


width:105px;

height:75px;


left:22px;

.cream .head,
.cream .cat-body,
.cream .ear,
.cream .tail{

}




.pink .head,
.pink .cat-body,
.pink .ear,
.pink .tail{

/* ушки */


.ear{


position:absolute;


width:35px;

}



.ear-left{

transform:skew(-20deg);

}



.ear-right{

}

.eye{

/* хвост */


.tail{


position:absolute;


width:55px;


height:18px;


right:-15px;


top:100px;


border-radius:20px;


transform:rotate(35deg);


}







/* лапки */


.paw{


position:absolute;


width:18px;


height:30px;


bottom:-18px;


}



.paw-left{

}



.paw-right{

/* бантик */


.bow{


position:absolute;


right:-10px;


top:35px;

height:35px;


}

.bow:after{


content:"";


position:absolute;


width:25px;

}

}



.bow:after{

<script>


// ===== КОТИКИ ВЗАИМОДЕЙСТВУЮТ =====


const cats = document.querySelectorAll(".cat");



cats.forEach(cat=>{


cat.addEventListener("click",()=>{


// прыжок


cat.animate(

[

{
transform:"scale(1)"
},


{
transform:"scale(1.25) translateY(-25px) rotate(8deg)"
},


{
transform:"scale(1)"
}


],

{

duration:700

}

);



// сердечко


createLove(cat);



// мяу пузырёк


createMeow(cat);



});



});







// ===== СЕРДЕЧКО =====


function createLove(cat){


let heart=document.createElement("div");


heart.innerHTML="💗";


heart.className="click-love";


let pos=cat.getBoundingClientRect();



heart.style.left=

pos.left+70+"px";



heart.style.top=

pos.top+"px";



document.body.appendChild(heart);



setTimeout(()=>{


heart.remove();


},1500);


}








// ===== МЯУ =====


function createMeow(cat){


let text=document.createElement("div");


let words=[

"мяу 🐾",

"мурр 🤍",

"♥",

"nya~"

];


text.innerHTML=

words[Math.floor(Math.random()*words.length)];



text.className="meow";



let pos=cat.getBoundingClientRect();



text.style.left=

pos.left+40+"px";



text.style.top=

pos.top-30+"px";



document.body.appendChild(text);



setTimeout(()=>{


text.remove();


},1500);



}








// ===== СЛУЧАЙНЫЕ ПРЫЖКИ =====



setInterval(()=>{


cats.forEach(cat=>{


if(Math.random()>0.5){


cat.animate(

[

{
transform:"translateY(0)"

},

{

transform:"translateY(-20px)"

},

{

transform:"translateY(0)"

}

],

{

duration:800

}

);



}


});


},3500);








// ===== ЛЕТЯЩИЕ СЕРДЕЧКИ =====



function floatingHeart(){


let h=document.createElement("div");


h.innerHTML="♡";


h.style.position="fixed";


h.style.left=

Math.random()*window.innerWidth+"px";



h.style.bottom="-30px";


h.style.color="#ff8fab";


h.style.fontSize="30px";


h.style.zIndex="3";


h.className="fly-heart";



document.body.appendChild(h);



setTimeout(()=>{


h.remove();


},6000);


}



setInterval(floatingHeart,2500);








// ===== СТИЛИ ЭФФЕКТОВ =====



let effects=document.createElement("style");



effects.innerHTML=`

.click-love{


position:fixed;

font-size:35px;

z-index:100;

animation:loveUp 1.5s forwards;


}



@keyframes loveUp{


0%{

opacity:1;

transform:

translateY(0)
scale(1);


}


100%{


opacity:0;


transform:

translateY(-100px)
scale(1.6);


}


}





.meow{


position:fixed;


background:white;


padding:8px 14px;


border-radius:20px;


color:#c02668;


font-weight:700;


font-size:14px;


z-index:100;


animation:

bubbleUp 1.5s forwards;


}



@keyframes bubbleUp{


0%{


opacity:0;


transform:scale(.5);


}



30%{


opacity:1;


}



100%{


opacity:0;


transform:

translateY(-50px);


}



}





.fly-heart{


animation:

fly 6s linear forwards;


}



@keyframes fly{


0%{


transform:translateY(0);


opacity:1;


}


100%{


transform:translateY(-100vh);


opacity:0;


}



}



`;



document.head.appendChild(effects);







// ===== МОБИЛЬНАЯ АДАПТАЦИЯ =====



function resizeCats(){


if(window.innerWidth < 700){


document.querySelectorAll(".big-cat")

.forEach(cat=>{


cat.style.scale="0.65";


});



}



}



resizeCats();


window.addEventListener(

"resize",

resizeCats

);



</script>
