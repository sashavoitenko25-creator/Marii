/* ===== КРАСИВЫЙ ФОН ===== */


body::before{

content:"";

position:absolute;

width:600px;

height:600px;

background:#ffb6d9;

border-radius:50%;

filter:blur(130px);

top:-250px;

left:-200px;

}



body::after{

content:"";

width:600px;

height:600px;

background:#cdb4ff;

border-radius:50%;

filter:blur(130px);

bottom:-250px;

right:-200px;

}





/* ===== БЛЁСТКИ ===== */


.spark{

position:absolute;

z-index:3;

font-size:35px;

animation:sparkMove 4s infinite ease-in-out;

}



.spark1{

top:15%;

left:20%;

}


.spark2{

right:20%;

top:25%;

animation-delay:1s;

}


.spark3{

bottom:20%;

left:15%;

animation-delay:2s;

}



@keyframes sparkMove{


0%,100%{

transform:scale(1);

opacity:.6;

}


50%{

transform:

scale(1.5)
rotate(180deg);

opacity:1;

}


}







/* ===== СЕРДЕЧКИ ===== */


.floating-heart{


position:absolute;

z-index:2;

font-size:35px;

heartFloat 5s infinite ease-in-out;

}



.heart1{

}


.heart2{

bottom:25%;

left:20%;

animation-delay:1s;

}



.heart3{

top:50%;

left:10%;

animation-delay:2s;

}



@keyframes heartFloat{


50%{

transform:

translateY(-40px)

scale(1.3);

}


}







/* ===== КАРТОЧКА ===== */


.card{

animation:

cardAppear 1s ease;

backdrop-filter:blur(10px);

}



@keyframes cardAppear{


from{

opacity:0;

transform:

translateY(50px)
scale(.9);

}



to{

transform:none;

}



}







/* ===== КНОПКИ ===== */


.btn{

overflow:hidden;

box-shadow:

0 10px 25px rgba(0,0,0,.12);

}



.btn::before{


content:"";

position:absolute;

width:100%;

height:100%;

background:

linear-gradient(

120deg,

transparent,

rgba(255,255,255,.5),

transparent

);


transform:

translateX(-120%);


transition:.6s;


}



.btn:hover::before{


transform:

translateX(120%);


}








/* ===== ПОДГОТОВКА 8-BIT КОТИКОВ ===== */


.pixel-cat{


position:absolute;

z-index:10;

image-rendering:pixelated;

cursor:pointer;

}



.big-cat{


width:170px;

height:170px;

}



.mini-cat{


width:70px;

height:70px;

}







/* большие котики будут ходить */


.cat-left{


left:-220px;

bottom:15%;


animation:

walkRight 12s linear infinite;


}




.cat-right{


right:-220px;

top:15%;


animation:

walkLeft 14s linear infinite;


}





.sitting-cat{


left:5%;

bottom:5%;


animation:

jumpCat 3s infinite;


}






@keyframes walkRight{


from{

left:-250px;

}


to{

left:110%;

}


}




@keyframes walkLeft{


from{

right:-250px;

}


to{

right:110%;

}


}




@keyframes jumpCat{


50%{

transform:

translateY(-30px);

}


}








/* маленькие котята */


.mini1{

bottom:10%;

left:30%;


animation:

miniMove 8s infinite linear;

}



.mini2{

top:20%;

right:30%;


animation:

miniMove 12s infinite linear;

}



.mini3{

bottom:35%;

right:10%;


animation:

miniMove 10s infinite linear;

}





@keyframes miniMove{


from{

transform:translateX(-100px);

}


to{

transform:translateX(300px);

}


}

<style>

<script>


// ===== КЛИК ПО КОТИКАМ =====


const cats = document.querySelectorAll(".pixel-cat");



cats.forEach(cat=>{


cat.addEventListener("click",()=>{


cat.style.transform=

"scale(1.3) rotate(15deg)";



createHeart(cat);



setTimeout(()=>{


cat.style.transform="";


},500);



});


});






// ===== СОЗДАНИЕ СЕРДЕЧКА =====


function createHeart(cat){


let heart=document.createElement("div");


heart.innerHTML="💗";


heart.className="click-love";


document.body.appendChild(heart);



let pos=cat.getBoundingClientRect();



heart.style.left=

pos.left+50+"px";



heart.style.top=

pos.top+"px";



setTimeout(()=>{


heart.remove();


},1500);


}







// стиль сердечка


let heartStyle=document.createElement("style");


heartStyle.innerHTML=`


.click-love{


position:fixed;

font-size:35px;

z-index:100;

animation:loveUp 1.5s forwards;


}



@keyframes loveUp{


0%{

opacity:1;

transform:

translateY(0)

scale(1);

}


100%{


opacity:0;

transform:

translateY(-100px)

scale(1.5);


}



}


`;



document.head.appendChild(heartStyle);








// ===== КОТИКИ Иногда меняют движение =====


setInterval(()=>{


cats.forEach(cat=>{


if(Math.random()>0.5){


cat.animate(


[

{
transform:"translateY(0)"
},

{
transform:"translateY(-25px)"
},

{
transform:"translateY(0)"
}

],


{

duration:700

}


);


}



});


},3000);








// ===== ЛЕТАЮЩИЕ СЕРДЕЧКИ =====


function floatingLove(){


let love=document.createElement("div");


love.innerHTML="♡";


love.style.position="fixed";


love.style.left=

Math.random()*window.innerWidth+"px";



love.style.bottom="-30px";


love.style.color="#ff8fab";


love.style.fontSize="28px";


love.style.zIndex="2";


love.style.animation="rise 6s linear forwards";



document.body.appendChild(love);



setTimeout(()=>{


love.remove();


},6000);



}




setInterval(floatingLove,2500);






let riseStyle=document.createElement("style");


riseStyle.innerHTML=`


@keyframes rise{


0%{


transform:

translateY(0);

opacity:1;


}


100%{


transform:

translateY(-110vh);

opacity:0;


}



}



`;



document.head.appendChild(riseStyle);






// ===== АДАПТАЦИЯ ТЕЛЕФОН =====


function mobile(){


if(window.innerWidth<600){



document.querySelectorAll(".big-cat")

.forEach(cat=>{


cat.style.scale="0.75";


});



}


}



mobile();


window.addEventListener(

"resize",

mobile

);



</script>
